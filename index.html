<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPX Dashboard Avanzado</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --dark-bg: #121212; --card-bg: #1e1e1e; --accent: #00e676; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; height: 100vh; background: var(--dark-bg); color: var(--text); }
        
        /* Sidebar */
        #sidebar { width: 380px; display: flex; flex-direction: column; border-right: 1px solid #333; z-index: 1000; }
        .header { padding: 20px; background: #1a1a1a; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #file-list { flex-grow: 1; overflow-y: auto; padding: 15px; background: var(--dark-bg); }
        
        /* Sort button */
        #sort-btn {
            display: flex; align-items: center; gap: 6px;
            margin-top: 10px; width: 100%; padding: 8px 12px;
            background: #2a2a2a; color: var(--accent);
            border: 1px solid var(--accent); border-radius: 5px;
            cursor: pointer; font-size: 0.85em; font-family: inherit;
            transition: background 0.2s;
        }
        #sort-btn:hover { background: #1a3a2a; }
        #sort-btn .arrow { font-size: 1em; transition: transform 0.3s; }
        #sort-btn.asc .arrow { transform: rotate(180deg); }

        /* Tarjetas */
        .track-card { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid var(--accent); transition: transform 0.2s, box-shadow 0.2s, background 0.2s; cursor: pointer; }
        .track-card:hover { transform: translateX(5px); }
        .track-card.selected { background: #1a2e22; box-shadow: 0 0 0 2px var(--accent); transform: translateX(5px); }
        .track-card h4 { margin: 0 0 8px 0; font-size: 0.95em; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .grid-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.8em; color: #aaa; }
        .val { color: var(--accent); font-weight: bold; }

        /* Stats Section */
        .stats-box { background: #1a1a1a; padding: 20px; border-top: 1px solid #333; }
        .weekly-stats { font-size: 0.85em; max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .week-entry { background: #252525; padding: 8px; margin-bottom: 5px; border-radius: 4px; border-bottom: 1px solid var(--accent); }

        #map { flex-grow: 1; height: 100vh; }
        input[type="file"] { width: 100%; margin-top: 10px; background: #333; color: white; border: none; padding: 8px; border-radius: 5px; box-sizing: border-box; }
        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--dark-bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; width: 340px; border-top: 3px solid var(--accent); }
        .login-box h2 { margin: 0 0 6px 0; color: var(--accent); }
        .login-box p { margin: 0 0 24px 0; color: #666; font-size: 0.85em; }
        .login-box input { width: 100%; padding: 10px 12px; margin-bottom: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: white; font-size: 0.9em; box-sizing: border-box; }
        .login-box input:focus { outline: none; border-color: var(--accent); }
        .login-btn { width: 100%; padding: 10px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: bold; font-size: 0.95em; cursor: pointer; }
        .login-btn:hover { background: #00c060; }
        .login-error { color: #ff5555; font-size: 0.82em; margin-top: 8px; min-height: 18px; }
    </style>
</head>
<body>

    <!-- Pantalla de login -->
    <div id="login-screen">
    <div class="login-box">
        <h2>GPX Dashboard</h2>
        <p>Acceso restringido</p>
        <input type="email" id="login-email" placeholder="Correo electrónico">
        <input type="password" id="login-password" placeholder="Contraseña">
        <button class="login-btn" id="login-btn">Iniciar sesión</button>
        <div class="login-error" id="login-error"></div>
    </div>
    </div>

<div id="sidebar">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0; color:var(--accent)">GPX Dashboard</h2>
            <button id="logout-btn" style="background:none; border:1px solid #444; color:#aaa; padding:4px 10px; border-radius:5px; cursor:pointer; font-size:0.8em;">Salir</button>
        </div>
        <div id="user-email" style="font-size:0.75em; color:#666; margin-top:4px;"></div>
        <input type="file" id="gpx-input" multiple accept=".gpx">
        <button id="sort-btn" title="Ordenar por fecha">
            <span class="arrow">↓</span>
            <span id="sort-label">Más reciente primero</span>
        </button>
        <button id="satellite-btn" style="display:flex; align-items:center; gap:6px; margin-top:8px; width:100%; padding:8px 12px; background:#2a2a2a; color:var(--accent); border:1px solid var(--accent); border-radius:5px; cursor:pointer; font-size:0.85em; font-family:inherit; transition:background 0.2s;">
            🛰 Vista satélite
        </button>
    </div>
    
    <div id="file-list"></div>

    <div class="stats-box">
        <div id="general-stats" style="font-size: 1.1em; margin-bottom: 10px;">Total: <span class="val" id="global-km">0</span> km</div>
        <div style="font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px;">Estadísticas Mensuales / Semanales</div>
        <div id="weekly-list" class="weekly-stats"></div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ── Supabase config ──────────────────────────────────────────
    const SUPABASE_URL = 'https://uiocfousdsfphddqajtx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpb2Nmb3VzZHNmcGhkZHFhanR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2Mzg2MzcsImV4cCI6MjA5MjIxNDYzN30.sIlGJle8IP7ur0NW1-iJR1KcLkcKhfFc9t-L81i3JgA';
    const BUCKET = 'gpx-files';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── Auth ─────────────────────────────────────────────────────
    async function checkSession() {
        const { data: { session } } = await db.auth.getSession();
        if (session) {
            showDashboard(session.user.email);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    }

    function showDashboard(email) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('user-email').textContent = email;
        loadFromCloud();
    }

    document.getElementById('login-btn').addEventListener('click', async function() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');
        errorEl.textContent = '';

        const { data, error } = await db.auth.signInWithPassword({ email, password });

        if (error) {
            errorEl.textContent = 'Correo o contraseña incorrectos';
            return;
        }

        showDashboard(data.user.email);
    });

    document.getElementById('logout-btn').addEventListener('click', async function() {
        await db.auth.signOut();
        location.reload();
    });

    const map = L.map('map').setView([0, 0], 2);

    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO',
        subdomains: 'abcd',
        maxZoom: 19
    });

    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '© Esri © OpenStreetMap',
        maxZoom: 19
    });

    darkLayer.addTo(map);
    let isSatellite = false;

    let totalGlobalDist = 0;
    // statsData structure: { "YYYY-MM": { label, weekStart, weekEnd, dist } }
    const statsData = {};

    // Track cards data for sorting: [{ date: Date, element: HTMLElement, layer, color }]
    let trackCards = [];
    let sortDescending = true; // true = más reciente primero
    let selectedCard = null;   // currently selected track card entry
    const allBounds = [];

    /* ── Week helpers ──────────────────────────────────────────── */

    /** Returns the Monday of the ISO week containing `date` */
    function getISOMonday(date) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        const day = d.getDay(); // 0=Sun
        const diff = (day === 0) ? -6 : 1 - day;
        d.setDate(d.getDate() + diff);
        return d;
    }

    /** ISO week number (1-53) */
    function getISOWeek(date) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
        const week1 = new Date(d.getFullYear(), 0, 4);
        return 1 + Math.round(((d - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
    }

    function getWeekInfo(date) {
        const monday = getISOMonday(date);
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);

        const opts = { day: '2-digit', month: 'short' };
        const isoWeek = getISOWeek(monday);

        // Key: year + ISO week number so weeks never bleed across months
        const year = monday.getFullYear();
        const weekKey = `${year}-W${String(isoWeek).padStart(2, '0')}`;

        const monthLabel = monday.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }).toUpperCase();
        const rangeLabel = `Semana ${isoWeek} · ${monday.toLocaleDateString('es-ES', opts)} – ${sunday.toLocaleDateString('es-ES', opts)}`;

        return { weekKey, monthLabel, rangeLabel, monday, sunday };
    }

    /* ── File input ────────────────────────────────────────────── */
// ── Renderiza un GPX en el mapa y sidebar ────────────────────
    function renderGPX(gpxText, filename, fromCloud = false) {
        return new Promise((resolve) => {
        const color = '#' + ((1 << 24) * Math.random() | 0).toString(16).padStart(6, '0');

        new L.GPX(gpxText, {
            async: true,
            marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
            polyline_options: { color, weight: 4, opacity: 0.8 }
        }).on('loaded', function(ev) {
            const g = ev.target;
            const distKm = g.get_distance() / 1000;
            const durationMs = g.get_moving_time();
            const speedKmh = durationMs > 0 ? (distKm / (durationMs / 3600000)) : 0;
            const start = g.get_start_time();
            const end   = g.get_end_time();

            totalGlobalDist += distKm;
            document.getElementById('global-km').innerText = totalGlobalDist.toFixed(2);

            if (start) {
                const info = getWeekInfo(start);
                if (!statsData[info.weekKey]) {
                    statsData[info.weekKey] = { monthLabel: info.monthLabel, rangeLabel: info.rangeLabel, monday: info.monday, dist: 0 };
                }
                statsData[info.weekKey].dist += distKm;
                updateStatsUI();
            }

            const card = document.createElement('div');
            card.className = 'track-card';
            card.style.borderLeftColor = color;
            card.dataset.timestamp = start ? start.getTime() : 0;
            card.innerHTML = `
                <h4>${filename}</h4>
                <div class="grid-meta">
                    <div>Fecha: <span class="val">${start ? start.toLocaleDateString('es-ES') : 'N/A'}</span></div>
                    <div>Dist: <span class="val">${distKm.toFixed(2)} km</span></div>
                    <div>Inicio: <span class="val">${start ? start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'}</span></div>
                    <div>Fin: <span class="val">${end ? end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'}</span></div>
                    <div style="grid-column: span 2">Vel. Media: <span class="val">${speedKmh.toFixed(2)} km/h</span></div>
                </div>
            `;

            const entry = { date: start ? start.getTime() : 0, element: card, layer: g, color };
            trackCards.push(entry);
            card.addEventListener('click', () => selectTrack(entry));

            allBounds.push(g.getBounds());
            renderCards();
            resolve();
        }).on('error', () => resolve()).addTo(map);
    });
}

    // ── Subir archivos nuevos a Supabase ────────────────────────
    async function uploadFiles(files) {
    if (!files || files.length === 0) return;

    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        console.log(`Subiendo ${i + 1}/${files.length}: ${file.name}`);

        try {
            const storagePath = `${Date.now()}_${file.name}`;

            const { error: upError } = await db.storage
                .from(BUCKET)
                .upload(storagePath, file, { contentType: 'application/gpx+xml' });

            if (upError) throw upError;

            const { error: dbError } = await db
                .from('gpx_tracks')
                .insert({ filename: file.name, storage_path: storagePath });

            if (dbError) throw dbError;

            const text = await file.text();
            await renderGPX(text, file.name, true);

        } catch (err) {
            console.error('Error subiendo', file.name, err);
        }
    }
}

document.getElementById('gpx-input').addEventListener('change', function(e) {
    uploadFiles(e.target.files);
    this.value = '';
});

    /* ── Track selection & highlight ──────────────────────────── */

    function selectTrack(entry) {
        // Deselect previous
        if (selectedCard) {
            selectedCard.element.classList.remove('selected');
            // Restore all tracks to normal opacity/weight
            trackCards.forEach(t => {
                t.layer.getLayers().forEach(l => {
                    if (l.setStyle) l.setStyle({ opacity: 0.8, weight: 4 });
                    else if (l.setOpacity) l.setOpacity(0.8);
                });
            });
        }

        // Clicking the same card again deselects
        if (selectedCard === entry) {
            selectedCard = null;
            return;
        }

        selectedCard = entry;
        entry.element.classList.add('selected');

        // Dim all other tracks
        trackCards.forEach(t => {
            const isSelected = t === entry;
            t.layer.getLayers().forEach(l => {
                if (l.setStyle) l.setStyle({
                    opacity: isSelected ? 1 : 0.15,
                    weight: isSelected ? 6 : 3
                });
                else if (l.setOpacity) l.setOpacity(isSelected ? 1 : 0.15);
            });
        });

        // Bring selected to front and fit bounds
        entry.layer.bringToFront();
        map.fitBounds(entry.layer.getBounds(), { padding: [40, 40] });
    }

    /* ── Sorting ───────────────────────────────────────────────── */

    function renderCards() {
        const sorted = [...trackCards].sort((a, b) =>
            sortDescending ? b.date - a.date : a.date - b.date
        );
        const list = document.getElementById('file-list');
        list.innerHTML = '';
        sorted.forEach(item => list.appendChild(item.element));
    }

    // ── Toggle satellite/dark map ────────────────────────────────
    document.getElementById('satellite-btn').addEventListener('click', function() {
        isSatellite = !isSatellite;
        if (isSatellite) {
            map.removeLayer(darkLayer);
            satelliteLayer.addTo(map);
            this.textContent = '🗺 Vista oscura';
        } else {
            map.removeLayer(satelliteLayer);
            darkLayer.addTo(map);
            this.textContent = '🛰 Vista satélite';
        }
    });
    
    document.getElementById('sort-btn').addEventListener('click', function() {
        sortDescending = !sortDescending;
        this.classList.toggle('asc', !sortDescending);
        document.getElementById('sort-label').textContent = sortDescending
            ? 'Más reciente primero'
            : 'Más antiguo primero';
        renderCards();
    });

    /* ── Stats UI ──────────────────────────────────────────────── */

    function updateStatsUI() {
        const container = document.getElementById('weekly-list');
        container.innerHTML = '';

        // Sort weeks chronologically descending
        const sortedKeys = Object.keys(statsData).sort((a, b) => b.localeCompare(a));

        // Group by month for display
        const byMonth = {};
        for (const key of sortedKeys) {
            const entry = statsData[key];
            if (!byMonth[entry.monthLabel]) byMonth[entry.monthLabel] = [];
            byMonth[entry.monthLabel].push({ key, ...entry });
        }

        for (const [month, weeks] of Object.entries(byMonth)) {
            const mesHeader = document.createElement('div');
            mesHeader.innerHTML = `<div style="color:var(--accent); margin-top:10px; font-weight:bold;">● ${month}</div>`;
            container.appendChild(mesHeader);

            for (const w of weeks) {
                const semDiv = document.createElement('div');
                semDiv.className = 'week-entry';
                semDiv.innerHTML = `
                    <div style="font-size:0.8em; color:#888">${w.rangeLabel}</div>
                    <div style="font-weight:bold">${w.dist.toFixed(2)} km</div>
                `;
                container.appendChild(semDiv);
            }
        }
    }
    // ── Cargar todas las rutas desde Supabase al abrir la página ──
    async function loadFromCloud() {
        try {
            const { data: tracks, error } = await db
                .from('gpx_tracks')
                .select('*')
                .order('uploaded_at', { ascending: false });

            if (error) throw error;
            if (!tracks || tracks.length === 0) return;

            for (let i = 0; i < tracks.length; i++) {
                const track = tracks[i];

                const { data: fileData, error: dlError } = await db.storage
                    .from(BUCKET)
                    .download(track.storage_path);

                if (dlError) { console.warn('Error descargando', track.filename); continue; }

                const text = await fileData.text();
                await renderGPX(text, track.filename, true);
            }

            if (allBounds.length > 0) {
                const combined = allBounds.reduce((acc, b) => acc.extend(b), L.latLngBounds(allBounds[0]));
                map.fitBounds(combined, { padding: [30, 30] });
            }

        } catch (err) {
            console.error('Error cargando desde Supabase:', err);
        }
    }

    checkSession();
</script>
</body>
</html>
