<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Dashboard Avanzado</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- fix -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Modal changelog -->
    <div id="changelog-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:9998;">
        <div style="background:var(--card-bg); padding:30px; border-radius:12px; width:420px; max-height:80vh; overflow-y:auto; border-top:3px solid var(--accent);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="margin:0; color:var(--accent);">📋 Novedades del sistema</h3>
            <button id="changelog-close" style="background:none; border:none; color:#aaa; cursor:pointer; font-size:1.2em;">✕</button>
        </div>
        <div id="changelog-content"></div>
    </div>
    </div>

    <!-- Modal filtrar asesores -->
    <div id="filter-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:9998;">
        <div style="background:var(--card-bg); padding:30px; border-radius:12px; width:320px; border-top:3px solid var(--accent);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; color:var(--accent);">👥 Filtrar asesores</h3>
                <button id="filter-close" style="background:none; border:none; color:#aaa; cursor:pointer; font-size:1.2em;">✕</button>
            </div>
            <div id="filter-list" style="margin-bottom:20px;"></div>
            <div style="display:flex; gap:8px;">
                <button id="filter-cancel" style="flex:1; padding:10px; background:#2a2a2a; color:#aaa; border:1px solid #444; border-radius:6px; cursor:pointer; font-size:0.9em;">Cancelar</button>
                <button id="filter-apply" style="flex:1; padding:10px; background:var(--accent); color:#000; border:none; border-radius:6px; cursor:pointer; font-size:0.9em; font-weight:bold;">Aplicar</button>
            </div>
        </div>
    </div>

    <!-- Modal renombrar ruta -->
    <div id="rename-modal">
    <div class="modal-box">
        <h3>✏️ Renombrar ruta</h3>
        <input type="text" id="rename-input" placeholder="Nombre de la ruta">
        <div class="modal-actions">
            <button class="btn-cancel" id="rename-cancel">Cancelar</button>
            <button class="btn-save" id="rename-save">Guardar</button>
        </div>
        </div>
    </div>

    <!-- Pantalla de login -->
    <div id="login-screen">
    <div class="login-box">
        <h2>GPX Dashboard</h2>
        <p>Acceso restringido</p>
        <input type="email" id="login-email" placeholder="Correo electrónico">
        <input type="password" id="login-password" placeholder="Contraseña">
        <button class="login-btn" id="login-btn">Iniciar sesión</button>
        <div class="login-error" id="login-error"></div>
    </div>
    </div>
    
    <!-- Modo Lite -->
    <div id="modo-lite" style="display:none; flex-direction:column; height:100vh; background:var(--dark-bg); width:100%; max-width:480px; margin:0 auto;">
        <div style="padding:16px 20px; background:#1a1a1a; box-shadow:0 2px 5px rgba(0,0,0,0.5);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; color:var(--accent); font-size:1.1em;">🗺 GPX Dashboard</h2>
                <button id="lite-logout-btn" style="background:none; border:1px solid #444; color:#aaa; padding:4px 10px; border-radius:5px; cursor:pointer; font-size:0.8em;">Salir</button>
            </div>
            <div id="lite-user-name" style="font-size:0.8em; color:#aaa; margin-top:4px;"></div>
            <input type="file" id="lite-gpx-input" multiple accept=".gpx" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:8px; border-radius:5px; box-sizing:border-box;">
            <div id="lite-status" style="font-size:0.78em; color:#888; margin-top:6px; min-height:18px;"></div>
            <button id="lite-fullmap-btn" style="margin-top:8px; width:100%; padding:8px; background:none; border:1px solid var(--accent); color:var(--accent); border-radius:5px; cursor:pointer; font-size:0.82em; font-family:inherit;">
                🗺 Ver mapa completo
            </button>
        </div>
        <div id="lite-list" style="flex:1; overflow-y:auto; padding:15px;"></div>
    </div>

    <button id="menu-btn">☰</button>
    <div id="sidebar-overlay"></div>

<div id="sidebar">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0; color:var(--accent)">GPX Dashboard</h2>
            <button id="logout-btn" style="background:none; border:1px solid #444; color:#aaa; padding:4px 10px; border-radius:5px; cursor:pointer; font-size:0.8em;">Salir</button>
        </div>
        <div id="user-email" style="font-size:0.75em; color:#666; margin-top:4px;"></div>
        <div id="user-role" style="font-size:0.75em; color:var(--accent); margin-top:2px;"></div>
        <button id="filter-btn" style="display:none; margin-top:8px; width:100%; padding:6px 12px; background:none; border:1px solid #444; color:#aaa; border-radius:5px; cursor:pointer; font-size:0.8em; font-family:inherit;">👥 Filtrar asesores</button>
        <button id="changelog-btn" style="display:none; margin-top:8px; width:100%; padding:6px 12px; background:none; border:1px solid #444; color:#aaa; border-radius:5px; cursor:pointer; font-size:0.8em; font-family:inherit;">📋 Ver novedades</button>
        <input type="file" id="gpx-input" multiple accept=".gpx">
        <div id="date-filter" style="display:flex; gap:4px; margin-top:8px; flex-wrap:wrap;">
            <button class="date-btn active" data-filter="all">Todos</button>
            <button class="date-btn" data-filter="today">Hoy</button>
            <button class="date-btn" data-filter="week">Semana</button>
            <button class="date-btn" data-filter="month">Mes</button>
            <button class="date-btn" data-filter="custom">📅</button>
        </div>
        <input type="date" id="custom-date" style="display:none; margin-top:6px; width:100%; padding:6px; background:#2a2a2a; color:white; border:1px solid #444; border-radius:5px; box-sizing:border-box;">
        <button id="sort-btn" title="Ordenar por fecha">
            <span class="arrow">↓</span>
            <span id="sort-label">Más reciente primero</span>
        </button>
        <button id="satellite-btn" style="display:flex; align-items:center; gap:6px; margin-top:8px; width:100%; padding:8px 12px; background:#2a2a2a; color:var(--accent); border:1px solid var(--accent); border-radius:5px; cursor:pointer; font-size:0.85em; font-family:inherit; transition:background 0.2s;">
            🛰 Vista satélite
        </button>
        <button id="view-map-btn" style="display:none; margin-top:8px; width:100%; padding:8px 12px; background:var(--accent); color:#000; border:none; border-radius:5px; cursor:pointer; font-size:0.85em; font-family:inherit; font-weight:bold;">
            🗺 Ver mapa
        </button>
    </div>
    
    <div id="file-list"></div>

    <div class="stats-box">
        <div id="general-stats" style="font-size: 1.1em; margin-bottom: 10px;">Total: <span class="val" id="global-km">0</span> km</div>
        <div style="font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px;">Estadísticas Mensuales / Semanales</div>
        <div id="weekly-list" class="weekly-stats"></div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>


</body>
</html>
